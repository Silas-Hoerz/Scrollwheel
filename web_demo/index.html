<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrollwheel</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
            --danger-color: #f85149;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .header {
            margin-bottom: 2rem;
            text-align: center;
        }

        button {
            background-color: #238636;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #2ea043;
        }

        .container {
            display: flex;
            gap: 4rem;
            align-items: center;
            background-color: var(--panel-bg);
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            border: 1px solid #30363d;
        }

        /* Circular UI */
        .wheel-container {
            position: relative;
            width: 250px;
            height: 250px;
            border-radius: 50%;
            border: 4px solid #30363d;
            background: radial-gradient(circle, #1e242c 0%, #0d1117 100%);
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.8), 0 0 15px rgba(88, 166, 255, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .wheel {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }

        .dot {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 20px;
            background-color: var(--accent-color);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--accent-color);
        }

        .center-button {
            width: 80px;
            height: 80px;
            background-color: #21262d;
            border-radius: 50%;
            border: 2px solid #30363d;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.1s;
            z-index: 10;
        }

        .center-button.pressed {
            background-color: var(--accent-color);
            color: #000;
            box-shadow: 0 0 20px var(--accent-color);
            transform: scale(0.95);
        }

        /* Data Panel */
        .data-panel {
            min-width: 340px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.2rem;
            border-bottom: 1px solid #30363d;
            padding-bottom: 0.5rem;
        }

        .data-value {
            font-family: 'Courier New', Courier, monospace;
            color: var(--accent-color);
            font-weight: bold;
            width: 140px;
            text-align: right;
        }

        /* Static Raw Grid */
        .raw-grid {
            margin-top: 1rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            background-color: #0d1117;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #30363d;
            font-family: monospace;
            font-size: 0.85rem;
            color: #8b949e;
        }

        .raw-item {
            display: flex;
            justify-content: space-between;
        }

        .raw-val {
            color: #c9d1d9;
            width: 60px;
            text-align: right;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>Scrollwheel</h1>
        <button id="connectBtn">Connect to Board (115200 Baud)</button>
    </div>

    <div class="container">
        <div class="wheel-container">
            <div class="wheel" id="wheelGraphic">
                <div class="dot" id="dotGraphic"></div>
            </div>
            <div class="center-button" id="centerBtnGraphic">BTN</div>
        </div>

        <div class="data-panel">
            <div class="data-row">
                <span>Mode:</span>
                <span class="data-value" id="valMode" style="font-family: inherit; font-size: 1rem;">Waiting...</span>
            </div>
            <div class="data-row">
                <span>Value:</span>
                <span class="data-value" id="valAngle">0.0°</span>
            </div>
            <div class="data-row">
                <span>Button:</span>
                <span class="data-value" id="valBtn">Released</span>
            </div>

            <div class="raw-grid">
                <div class="raw-item"><span>Angle:</span><span class="raw-val" id="rawAngle">0.0</span></div>
                <div class="raw-item"><span>Velocity:</span><span class="raw-val" id="rawVel">0.0</span></div>
                <div class="raw-item"><span>VirtPos:</span><span class="raw-val" id="rawPos">0.0</span></div>
                <div class="raw-item"><span>State:</span><span class="raw-val" id="rawState">0</span></div>
            </div>
        </div>
    </div>

    <script>
        const connectBtn = document.getElementById('connectBtn');
        const wheelGraphic = document.getElementById('wheelGraphic');
        const centerBtnGraphic = document.getElementById('centerBtnGraphic');
        const dotGraphic = document.getElementById('dotGraphic');

        const valMode = document.getElementById('valMode');
        const valAngle = document.getElementById('valAngle');
        const valBtn = document.getElementById('valBtn');

        const rawAngle = document.getElementById('rawAngle');
        const rawVel = document.getElementById('rawVel');
        const rawPos = document.getElementById('rawPos');
        const rawState = document.getElementById('rawState');

        let port;
        let reader;
        let keepReading = true;

        dotGraphic.style.opacity = 0.2;

        connectBtn.addEventListener('click', async () => {
            if (port) {
                keepReading = false;
                if (reader) await reader.cancel();
                await port.close();
                port = null;
                connectBtn.innerText = 'Connect to Arduino (115200 Baud)';
                connectBtn.style.backgroundColor = '#238636';
                return;
            }

            try {
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                connectBtn.innerText = 'Disconnect';
                connectBtn.style.backgroundColor = 'var(--danger-color)';
                keepReading = true;
                readLoop();
            } catch (err) {
                console.error('Error opening port:', err);
                alert('Could not open serial port. ' + err);
            }
        });

        async function readLoop() {
            const textDecoder = new TextDecoderStream();
            port.readable.pipeTo(textDecoder.writable);
            reader = textDecoder.readable.getReader();

            let buffer = '';
            try {
                while (keepReading) {
                    const { value, done } = await reader.read();
                    if (done) break;

                    buffer += value;
                    let lines = buffer.split('\n');
                    for (let i = 0; i < lines.length - 1; i++) {
                        parseLine(lines[i].trim());
                    }
                    buffer = lines[lines.length - 1];
                }
            } catch (error) {
                console.error('Read loop error:', error);
            } finally {
                reader.releaseLock();
            }
        }

        function parseLine(line) {
            if (!line) return;

            // --- Basic Mode Parser ("180;1" or "#;0") ---
            if (line.includes(';') && !line.includes('FilteredAngle:')) {
                valMode.innerText = "Basic Raw Data";
                const parts = line.split(';');

                if (parts.length >= 2) {
                    const angleStr = parts[0].trim();
                    const btnStr = parts[1].trim();

                    if (angleStr === '#') {
                        dotGraphic.style.opacity = 0.2;
                        valAngle.innerText = "Untouched";
                        rawAngle.innerText = "---";
                    } else {
                        dotGraphic.style.opacity = 1.0;
                        const angle = parseFloat(angleStr);
                        wheelGraphic.style.transform = `rotate(${angle}deg)`;
                        valAngle.innerText = `${angle.toFixed(1)}°`;
                        rawAngle.innerText = angle.toFixed(1);
                    }

                    // Reset values not used in Basic Mode
                    rawVel.innerText = "N/A";
                    rawPos.innerText = "N/A";
                    rawState.innerText = "N/A";

                    if (btnStr === '1') {
                        centerBtnGraphic.classList.add('pressed');
                        valBtn.innerText = "PRESSED";
                    } else {
                        centerBtnGraphic.classList.remove('pressed');
                        valBtn.innerText = "Released";
                    }
                }
            }
            // --- Advanced Mode Parser ("FilteredAngle:...") ---
            else if (line.includes('FilteredAngle:')) {
                valMode.innerText = "Advanced Kinematics";

                const angleM = line.match(/FilteredAngle:([\d\.-]+)/);
                const velM = line.match(/Velocity:([\d\.-]+)/);
                const posM = line.match(/VirtualPos:([\d\.-]+)/);
                const stateM = line.match(/State:(\d+)/);
                const btnM = line.match(/Btn:(\d)/);

                if (posM) {
                    const virtualPos = parseFloat(posM[1]);
                    const displayAngle = ((virtualPos % 360) + 360) % 360;

                    dotGraphic.style.opacity = 1.0;
                    wheelGraphic.style.transform = `rotate(${displayAngle}deg)`;
                    valAngle.innerText = `${virtualPos.toFixed(1)}`;

                    rawPos.innerText = virtualPos.toFixed(1);
                }

                if (angleM) rawAngle.innerText = parseFloat(angleM[1]).toFixed(1);
                if (velM) rawVel.innerText = parseFloat(velM[1]).toFixed(1);
                if (stateM) {
                    const states = ["Idle", "Scroll", "Momentum", "Snap"];
                    rawState.innerText = states[parseInt(stateM[1])] || stateM[1];
                }

                if (btnM) {
                    const isPressed = btnM[1] === '1';
                    if (isPressed) {
                        centerBtnGraphic.classList.add('pressed');
                        valBtn.innerText = "PRESSED";
                    } else {
                        centerBtnGraphic.classList.remove('pressed');
                        valBtn.innerText = "Released";
                    }
                }
            }
        }
    </script>
</body>

</html>
